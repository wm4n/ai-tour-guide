name: flutter_app
description: AI Tour Guide Flutter App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.0
  permission_handler: ^11.3.0
  just_audio: ^0.9.40
  audio_session: ^0.1.21
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  http: ^1.2.0
  http_parser: ^4.0.0
  go_router: ^14.3.0
  path_provider: ^2.1.3
  record: ^5.0.0
  flutter_local_notifications: ^17.2.4
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  mocktail: ^1.0.3
  flutter_lints: ^4.0.0

dependency_overrides:
  record_linux: ^1.3.0

flutter:
  uses-material-design: true
